<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Гах ГПТ</title>
<style>
:root {
  --bg: #0b0f19;
  --surface: #111827;
  --surface-2: #1f2937;
  --border: #1e293b;
  --primary: #3b82f6;
  --text: #e5e7eb;
  --muted: #94a3b8;
  --warn: #f87171;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

header img { width: 36px; height: 36px; }
header h1 { margin: 0; font-size: 18px; font-weight: 600; }

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.message {
  max-width: 65%;
  padding: 12px 16px;
  border-radius: 14px;
  line-height: 1.5;
  font-size: 15px;
  white-space: pre-wrap;
  word-wrap: break-word;
  animation: fadeIn 0.2s ease;
}

.user { align-self: flex-end; background: var(--primary); color: white; }
.bot { align-self: flex-start; background: var(--surface-2); border: 1px solid var(--border); }

@keyframes fadeIn { from {opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }

#input-container {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  padding: 14px 20px;
  background: var(--surface);
  border-top: 1px solid var(--border);
}

#textInput {
  flex: 1;
  padding: 10px 14px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  font-size: 15px;
  outline: none;
  resize: none;
  overflow: hidden;
  line-height: 1.4;
  max-height: 150px;
  transition: border 0.2s, background 0.2s;
}

#textInput::placeholder { color: var(--muted); }
#textInput:focus { border-color: var(--primary); background: #162133; }

button {
  padding: 12px 18px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  background: var(--primary);
  color: white;
  font-weight: 600;
  transition: opacity 0.2s, transform 0.1s;
  flex-shrink: 0;
}
button:disabled { opacity: 0.4; cursor: not-allowed; }
button:hover:not(:disabled) { opacity: 0.9; }
button:active:not(:disabled) { transform: scale(0.97); }

#limitWarning { color: var(--warn); font-size: 13px; margin-left: 10px; }
</style>
</head>
<body>

<header>
  <img src="https://zlaoslav.github.io/gah-gpt/favicon.ico">
  <h1>Гах ГПТ by Slavik!</h1>
</header>

<div id="chat"></div>

<div id="input-container">
  <textarea id="textInput" placeholder="Введите сообщение..." rows="1"></textarea>
  <button id="sendBtn" onclick="sendMessage()">Отправить</button>
  <div id="limitWarning"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
let BACKEND_URL = "http://gahgpt.slavi.workers.dev";
if(location.protocol === "https:"){
  BACKEND_URL = BACKEND_URL.replace("http://", "https://");
}

const COOLDOWN = 6;
const MAX_CHARS = 5000;
const MAX_MESSAGES = 100;

const input = document.getElementById("textInput");
const chat = document.getElementById("chat");
const sendBtn = document.getElementById("sendBtn");
const limitWarning = document.getElementById("limitWarning");

let cooldownTimer = 0;
let typingDotsInterval;
let dialogHistory = [];

window.onload = () => {
  const savedText = localStorage.getItem("draft_text");
  if(savedText) input.value = savedText;

  const savedDialog = localStorage.getItem("dialog_history");
  if(savedDialog){
    dialogHistory = JSON.parse(savedDialog);
    dialogHistory.forEach(msg=>{
      renderMessage(msg.text, msg.role);
    });
  }

  autoResize(input);
  chat.scrollTop = chat.scrollHeight;
  checkLimit();
};

input.addEventListener("input", () => {
  autoResize(input);
  localStorage.setItem("draft_text", input.value);
  checkLimit();
});

input.addEventListener("keydown", e => { 
  if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); sendMessage(); }
});

function autoResize(el){
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 150) + "px";
}

function checkLimit(){
  if(input.value.length > MAX_CHARS){
    sendBtn.disabled = true;
    limitWarning.textContent = `Превышен лимит ${MAX_CHARS} символов!`;
  } else {
    limitWarning.textContent = "";
    if(cooldownTimer <= 0) sendBtn.disabled = false;
  }
}

function renderMessage(text, role){
  const msg = document.createElement("div");
  msg.className = `message ${role}`;
  if(role==="bot"){
    msg.innerHTML = marked.parse(text);
  } else {
    msg.textContent = text;
  }
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
  return msg;
}

function typeEffectWithDots(element, text, speed=18){
  element.innerHTML = "<span></span>";
  const span = element.querySelector("span");
  let i=0, dots=0;

  typingDotsInterval = setInterval(()=>{
    if(i >= text.length){
      clearInterval(typingDotsInterval);
      element.innerHTML = marked.parse(text);
      chat.scrollTop = chat.scrollHeight;
      return;
    }
    if(dots<3){ 
      span.textContent = span.textContent.replace(/\.{1,3}$/,"") + ".";
      dots++;
    } else {
      dots=0;
      span.textContent = span.textContent.replace(/\.{1,3}$/,"");
    }
    chat.scrollTop = chat.scrollHeight;
  }, 500);

  function typing(){
    if(i<text.length){
      span.textContent += text.charAt(i);
      i++;
      chat.scrollTop = chat.scrollHeight;
      setTimeout(typing, speed);
    }
  }
  typing();
}

function startCooldown(){
  cooldownTimer = COOLDOWN;
  sendBtn.disabled = true;
  const interval = setInterval(()=>{
    cooldownTimer -= 0.1;
    checkLimit();
    if(cooldownTimer <= 0){
      sendBtn.disabled = input.value.length > MAX_CHARS;
      clearInterval(interval);
    }
  }, 100);
}

function saveDialog(){
  while(dialogHistory.length > MAX_MESSAGES){
    dialogHistory.shift();
  }
  localStorage.setItem("dialog_history", JSON.stringify(dialogHistory));
}

async function sendMessage(){
  if(sendBtn.disabled) return;
  const text = input.value.trim();
  if(!text) return;
  if(text.length > MAX_CHARS) return;

  renderMessage(text,"user");
  dialogHistory.push({role:"user", text});
  saveDialog();

  input.value="";
  localStorage.removeItem("draft_text");
  autoResize(input);
  checkLimit();

  sendBtn.disabled = true;
  startCooldown();

  const botMessage = renderMessage("", "bot");

  try{
    let dialogText = "";
    for(let i=dialogHistory.length-1;i>=0;i--){
      const roleLabel = dialogHistory[i].role==="user"?"User: ":"Bot: ";
      const entry = roleLabel + dialogHistory[i].text + "\n";
      if((entry + dialogText).length>5000) break;
      dialogText = entry + dialogText;
    }

    const response = await fetch(`${BACKEND_URL}/ask?text=${encodeURIComponent(dialogText)}`);
    if(!response.ok){
      botMessage.textContent = "Ошибка соединения с сервером.";
      return;
    }

    const data = await response.text();
    dialogHistory.push({role:"bot", text:data});
    saveDialog();

    clearInterval(typingDotsInterval);
    typeEffectWithDots(botMessage, data);

  } catch(err){
    botMessage.textContent = "Ошибка соединения с сервером.";
  }
}
</script>

</body>
</html>
