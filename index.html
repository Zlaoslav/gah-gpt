<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Гах ГПТ</title>

<style>
:root {
  --bg: #0b0f19;
  --surface: #111827;
  --surface-2: #1f2937;
  --border: #1e293b;
  --primary: #3b82f6;
  --text: #e5e7eb;
  --muted: #94a3b8;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* Header */
header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

header img { width: 36px; height: 36px; }
header h1 { margin: 0; font-size: 18px; font-weight: 600; }

/* Chat */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.message {
  max-width: 65%;
  padding: 12px 16px;
  border-radius: 14px;
  line-height: 1.5;
  font-size: 15px;
  white-space: pre-wrap;
  word-wrap: break-word;
  animation: fadeIn 0.2s ease;
}

.user { align-self: flex-end; background: var(--primary); color: white; }
.bot { align-self: flex-start; background: var(--surface-2); border: 1px solid var(--border); }

@keyframes fadeIn { from {opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }

/* Input */
#input-container {
  display: flex;
  gap: 10px;
  padding: 14px 20px;
  background: var(--surface);
  border-top: 1px solid var(--border);
}

#textInput {
  flex: 1;
  padding: 10px 14px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  font-size: 15px;
  outline: none;
  resize: none; /* авто-рост через JS */
  overflow: hidden;
  line-height: 1.4;
  transition: border 0.2s, background 0.2s;
}

#textInput::placeholder { color: var(--muted); }
#textInput:focus { border-color: var(--primary); background: #162133; }

button {
  padding: 12px 18px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  background: var(--primary);
  color: white;
  font-weight: 600;
  transition: opacity 0.2s, transform 0.1s;
}
button:disabled { opacity: 0.4; cursor: not-allowed; }
button:hover:not(:disabled) { opacity: 0.9; }
button:active:not(:disabled) { transform: scale(0.97); }
</style>
</head>
<body>

<header>
  <img src="https://zlaoslav.github.io/gah-gpt/favicon.ico">
  <h1>Гах ГПТ by Slavik!</h1>
</header>

<div id="chat"></div>

<div id="input-container">
  <textarea id="textInput" placeholder="Введите сообщение..." rows="1"></textarea>
  <button id="sendBtn" onclick="sendMessage()">Отправить</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const BACKEND_URL = "http://gahgpt.slavi.workers.dev";
const COOLDOWN = 11;

const input = document.getElementById("textInput");
const chat = document.getElementById("chat");
const sendBtn = document.getElementById("sendBtn");

let cooldownTimer = 0;
let typingDotsInterval;

window.onload = () => {
  const savedText = localStorage.getItem("draft_text");
  if (savedText) input.value = savedText;
  autoResize(input);
};

input.addEventListener("input", () => {
  localStorage.setItem("draft_text", input.value);
  autoResize(input);
});

input.addEventListener("keydown", e => { if(e.key==="Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

// авто-рост поля ввода
function autoResize(el) {
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
}

// добавление сообщения
function addMessage(text, sender) {
  const msg = document.createElement("div");
  msg.className = `message ${sender}`;
  if(sender==="bot"){ msg.innerHTML = text; }
  else { msg.textContent = text; }
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
  return msg;
}

// печатает с анимацией ". .. ..."
function typeEffectWithDots(element, text, speed=18) {
  element.innerHTML = "";
  let i=0, dots=0;
  typingDotsInterval = setInterval(()=>{
    if(i>=text.length){ clearInterval(typingDotsInterval); element.innerHTML = marked.parse(element.textContent); return; }
    if(dots<3){ element.innerHTML = element.innerHTML.replace(/\.{1,3}$/, "") + "."; dots++; }
    else{ dots=0; element.innerHTML = element.innerHTML.replace(/\.{1,3}$/, ""); }
  }, 500);

  function typing() {
    if(i<text.length){
      element.textContent += text.charAt(i);
      i++;
      chat.scrollTop = chat.scrollHeight;
      setTimeout(typing, speed);
    }
  }
  typing();
}

// кулдаун кнопки
function startCooldown() {
  cooldownTimer = COOLDOWN;
  sendBtn.disabled = true;
  const interval = setInterval(()=>{
    cooldownTimer -= 0.1;
    if(cooldownTimer <=0){
      sendBtn.disabled = false;
      clearInterval(interval);
    }
  },100);
}

// отправка сообщения
async function sendMessage() {
  if (sendBtn.disabled) return;
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";
  localStorage.removeItem("draft_text");
  autoResize(input);

  sendBtn.disabled = true;
  startCooldown();

  const botMessage = addMessage("", "bot");

  try {
    const response = await fetch(`${BACKEND_URL}/ask?text=${encodeURIComponent(text)}`);

    if (!response.ok) {
      botMessage.textContent = "Ошибка соединения с сервером.";
      return;
    }

    // Получаем просто текст
    const data = await response.text();

    clearInterval(typingDotsInterval);
    typeEffectWithDots(botMessage, data); // передаем текст напрямую
  } catch (err) {
    botMessage.textContent = "Ошибка соединения с сервером.";
  }
}
</script>

</body>
</html>
