<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test GPT</title>

<style>
:root {
  --bg: #0b0f19;
  --surface: #111827;
  --surface-2: #1f2937;
  --border: #1e293b;
  --primary: #3b82f6;
  --text: #e5e7eb;
  --muted: #94a3b8;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* Header */
header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

header img {
  width: 36px;
  height: 36px;
}

header h1 {
  margin: 0;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

/* Chat */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* Messages */
.message {
  max-width: 65%;
  padding: 12px 16px;
  border-radius: 14px;
  line-height: 1.5;
  font-size: 15px;
  white-space: pre-wrap;
  word-wrap: break-word;
  animation: fadeIn 0.2s ease;
}

.user {
  align-self: flex-end;
  background: var(--primary);
  color: white;
}

.bot {
  align-self: flex-start;
  background: var(--surface-2);
  border: 1px solid var(--border);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Input */
#input-container {
  display: flex;
  gap: 10px;
  padding: 14px 20px;
  background: var(--surface);
  border-top: 1px solid var(--border);
}

#textInput {
  flex: 1;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  font-size: 15px;
  outline: none;
  transition: border 0.2s, background 0.2s;
}

#textInput::placeholder {
  color: var(--muted);
}

#textInput:focus {
  border-color: var(--primary);
  background: #162133;
}

button {
  padding: 12px 18px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  background: var(--primary);
  color: white;
  font-weight: 600;
  transition: opacity 0.2s, transform 0.1s;
}

button:hover {
  opacity: 0.9;
}

button:active {
  transform: scale(0.97);
}
</style>
</head>
<body>

<header>
  <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">
  <h1>Test GPT</h1>
</header>

<div id="chat"></div>

<div id="input-container">
  <input type="text" id="textInput" placeholder="Введите сообщение...">
  <button onclick="sendMessage()">Отправить</button>
</div>

<script>
const BACKEND_URL = "http://localhost:8000"; // замени на свой

const input = document.getElementById("textInput");
const chat = document.getElementById("chat");

window.onload = () => {
  const savedText = localStorage.getItem("draft_text");
  if (savedText) input.value = savedText;
};

input.addEventListener("input", () => {
  localStorage.setItem("draft_text", input.value);
});

input.addEventListener("keydown", e => {
  if (e.key === "Enter") sendMessage();
});

function addMessage(text, sender) {
  const msg = document.createElement("div");
  msg.className = `message ${sender}`;
  msg.textContent = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
  return msg;
}

function typeEffect(element, text, speed = 18) {
  let i = 0;
  function typing() {
    if (i < text.length) {
      element.textContent += text.charAt(i);
      i++;
      chat.scrollTop = chat.scrollHeight;
      setTimeout(typing, speed);
    }
  }
  typing();
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";
  localStorage.removeItem("draft_text");

  const botMessage = addMessage("", "bot");

  try {
    const response = await fetch(
      `${BACKEND_URL}/ask?text=${encodeURIComponent(text)}`
    );

    const data = await response.json();
    typeEffect(botMessage, data.response);

  } catch (err) {
    botMessage.textContent = "Ошибка соединения с сервером.";
  }
}
</script>

</body>
</html>
